
name: build

on:
  pull_request:
    paths-ignore:
      - docs
      - .devcontainer
      - examples

permissions:
  contents: read

jobs:
  build_sdk:
    name: build_sdk
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        language:
          - nodejs
          - python
          - go

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Unshallow clone for tags
        run: git fetch --prune --unshallow --tags

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Build SDK
        run: make build_${{ matrix.language }}

      - name: Check worktree clean
        # Version-bearing files are regenerated per build; everything else
        # must match what was committed.
        uses: pulumi/git-status-check-action@v1
        with:
          allowed-changes: |
            sdk/**/pulumi-plugin.json
            sdk/nodejs/package.json
            sdk/python/pyproject.toml
            sdk/go/**/internal/pulumiUtilities.go

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Run golangci-lint
        # Lint library packages only; cmd/ depends on schema-embed.json which is generated at build time.
        run: cd provider && golangci-lint run --path-prefix provider -c ../.golangci.yml . ./pkg/...

  unit_test:
    name: unit-test
    runs-on: ubuntu-latest
    # The astronomer-live environment gate was intentionally dropped here
    # so PRs run end-to-end without a required-reviewer pause. The
    # `pull_request` trigger means fork PRs run with fork-owned code and
    # no secrets — `make test_python` skips itself when ASTRO_API_TOKEN is
    # unset.
    env:
      ASTRO_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}
      ASTRO_WORKSPACE_ID: ${{ secrets.ASTRO_WORKSPACE_ID }}
      ASTRO_ORGANIZATION_ID: ${{ secrets.ASTRO_ORGANIZATION_ID }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Unshallow clone for tags
        run: git fetch --prune --unshallow --tags

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: go vet
        # Exclude cmd/ packages: they embed schema-embed.json which is generated at build time.
        run: cd provider && go vet . ./pkg/...

      - name: go test
        run: cd provider && go test -v -short -parallel 10 . ./pkg/...

      - name: Python SDK smoke tests
        run: make test_python_smoke

      - name: Live integration tests
        run: make test_python

  schema_validation:
    name: schema-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Validate schema is valid JSON
        run: |
          jq . provider/cmd/pulumi-resource-astronomer/schema.json > /dev/null
          echo "Schema JSON is valid"

      - name: Check schema resource count
        run: |
          COUNT=$(jq '.resources | length' provider/cmd/pulumi-resource-astronomer/schema.json)
          echo "Schema contains $COUNT resources"
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: Schema has zero resources - something went wrong with generation"
            exit 1
          fi
