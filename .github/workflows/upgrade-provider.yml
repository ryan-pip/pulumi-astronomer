name: Upgrade provider
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'
jobs:
  upgrade_provider:
    name: upgrade-provider
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Mint pulumi-release-bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch main
        if: github.ref != 'refs/heads/main'
        run: git fetch --depth=1 origin main:main
        shell: bash

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s
        with:
          version: 2026.3.7
          cache_save: false
          cache_key: "mise-full-{{platform}}-{{file_hash}}"

      - name: Install upgrade-provider
        run: go install github.com/pulumi/upgrade-provider@main
        shell: bash

      - name: Set up git identity
        run: |
          git config --global user.name 'pulumi-release-bot[bot]'
          git config --global user.email 'pulumi-release-bot[bot]@users.noreply.github.com'
        shell: bash

      - name: Run upgrade-provider
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: upgrade-provider "$GITHUB_REPOSITORY" --kind=all --allow-missing-docs=true --repo-path=.
        shell: bash

      - name: Enable auto-merge on upgrade PR
        # safety filter — both bot author + branch prefix required
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          BRANCH=$(git branch --show-current)
          case "$BRANCH" in
            upgrade-pulumi-terraform-bridge-*|upgrade-terraform-provider-*|upgrade-pulumi-version-*) ;;
            *) echo "branch $BRANCH not an upgrade branch; skipping"; exit 0 ;;
          esac
          AUTHOR=$(gh pr view --json author --jq .author.login)
          if [ "$AUTHOR" != "app/pulumi-release-bot" ]; then
            echo "PR author is $AUTHOR (not app/pulumi-release-bot); skipping"
            exit 0
          fi
          gh pr merge --auto --squash --delete-branch
        shell: bash
