name: Upgrade provider
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  upgrade_provider:
    name: upgrade-provider
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      # fetch-depth: 0 — upgrade-provider reads provider/go.mod from `main`
      # (via `git show main:...`) to discover the current bridge version. With
      # the default shallow fetch it exits 128.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s
        with:
          version: 2026.3.7
          cache_save: false

      - name: Install upgrade-provider
        # @main matches the upstream boilerplate. If a future upstream commit
        # breaks again, pin a SHA here.
        run: go install github.com/pulumi/upgrade-provider@main
        shell: bash

      - name: Set up git identity
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
        shell: bash

      - name: Run upgrade-provider
        run: upgrade-provider "$GITHUB_REPOSITORY" --kind=all --allow-missing-docs=true --repo-path=.
        shell: bash

      - name: Enable auto-merge on upgrade PRs
        # Restrict to PRs authored by github-actions[bot] (the action's identity
        # when GH_TOKEN is GITHUB_TOKEN) on a known upgrade-* branch prefix.
        # Both filters together prevent ever auto-merging a human PR.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # yamllint disable rule:line-length
        run: |
          set -euo pipefail
          mapfile -t PRS < <(gh pr list \
            --state open \
            --author 'app/github-actions' \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | test("^upgrade-(pulumi-terraform-bridge|terraform-provider|pulumi-version)-")) | .number')
          for pr in "${PRS[@]}"; do
            echo "Enabling auto-merge on PR #$pr"
            gh pr merge "$pr" --auto --squash --delete-branch
          done
        # yamllint enable rule:line-length
