version: "2"

linters:
  default: none
  enable:
    # Core correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style / quality
    - goconst
    - lll
    - misspell
    - nakedret
    - unconvert
    # Security
    - gosec
    # Replaces golint / interfacer (removed in golangci-lint v1.57+)
    - revive
  exclusions:
    paths:
      - schema.go
      - pulumiManifest.go
      # cmd/ depends on schema-embed.json generated at build time;
      # entry point has no logic to lint.
      - cmd

run:
  timeout: 20m
