[settings]
experimental = true # Required for Go binaries (e.g. pulumictl).

[tools]
github-cli = "latest"

go = "1.24"
node = "22"
python = "3.11"
dotnet = "8.0"
java = "corretto-11"

pulumi = "latest"
golangci-lint = "2"
"go:github.com/pulumi/pulumictl/cmd/pulumictl" = "latest"
"go:github.com/pulumi/upgrade-provider" = "main"


[env]
GOTOOLCHAIN = "go1.24.13"
